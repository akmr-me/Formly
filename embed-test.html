<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formly Embed Test</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: #f3f4f6;
        color: #111827;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.75rem;
      }

      p {
        margin: 0 0 20px;
        color: #4b5563;
        line-height: 1.5;
      }

      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }

      .status {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 10px;
        background: #eff6ff;
        color: #1d4ed8;
        font-size: 0.95rem;
      }

      iframe {
        display: block;
        width: 100%;
        min-height: 600px;
        border: 0;
        border-radius: 12px;
        background: #fff;
      }

      code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Formly Embed Test Page</h1>
      <p>
        Open this page at
        <code>http://localhost:5500/embed-test.html</code>
        (not as a file from Finder). Your Formly client must be running on
        <code>http://localhost:3000</code>.
      </p>

      <div class="card">
        <!-- Replace the src with the embed URL you copied from Formly -->
        <iframe
          src="http://localhost:3000/embed/CTkgbYrJ"
          width="100%"
          height="600"
          style="border: 0"
          loading="lazy"
          title="Formly form"
        ></iframe>
      </div>

      <div class="status" id="status">
        Waiting for form submission...
      </div>
    </main>

    <script>
      window.addEventListener("message", (event) => {
        if (event.data?.type === "formly:submitted") {
          document.getElementById("status").textContent =
            "Success! Form submitted: " + event.data.formId;
        }
      });
    </script>
  </body>
</html>
